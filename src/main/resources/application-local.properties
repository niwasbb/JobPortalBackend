
spring.datasource.url=jdbc:mysql://localhost:3306/jobportaldatabase
spring.datasource.username=root
spring.datasource.password=niwas
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=none

spring.flyway.enabled=true
spring.flyway.location=classpath:db/migration
spring.flyway.baseline-on-migrate=true
spring.flyway.baseline-version=1

# JWT Secret Key
security.jwt.secret=${JWT_SECRET}

# S3 client properties
aws.region.static=ap-southeast-2
aws.s3.bucket-name=${AWS_BUCKET_NAME}
aws.credentials.access-key=${AWS_ACCESS_KEY}
aws.credentials.secret-key=${AWS_SECRET_KEY}

# MAIL Server Configuration
spring.servlet.multipart.max-file-size=05MB
spring.servlet.multipart.max-request-size=10MB

spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${MAIL_USERNAME}
spring.mail.password=${MAIL_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true



