spring.application.name=JobPortalBackend
# DataSource Configuration
spring.datasource.url=${MYSQL_URL}
spring.datasource.username=${MYSQL_USER}
spring.datasource.password=${MYSQL_PASSWORD}
#spring.datasource.url=jdbc:mysql://host.docker.internal:3306/jobportaldatabase
#spring.datasource.username=root
#spring.datasource.password=admin
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.format_sql=true

# JWT Secret Key
security.jwt.secret=${JWT_SECRET}

# AWS S3 Configuration
aws.s3.bucket-name=${S3_BUCKET_NAME}
# AWS Credentials (if not using default provider chain)
aws.access-key-id=${AWS_ACCESS_KEY_ID}
aws.secret-access-key=${AWS_SECRET_ACCESS_KEY}
aws.region=${AWS_REGION}

# MAIL Server Configuration
spring.servlet.multipart.max-file-size=05MB
spring.servlet.multipart.max-request-size=10MB

spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${MAIL_USERNAME}
spring.mail.password=${MAIL_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true



